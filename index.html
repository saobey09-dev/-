<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>سوق الدواء السوداني | دخول</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
/* إعدادات الخلفية والتصميم الاحترافي */
:root {
--primary-blue: #0062ff;
--glass-bg: rgba(255, 255, 255, 0.92);
}

* { box-sizing: border-box; font-family: 'Cairo', sans-serif; }

body, html {
margin: 0; padding: 0; height: 100%; width: 100%;
overflow: hidden; /* لمنع التمرير في شاشة الدخول */
}

/* الخلفية: صور طبية متداخلة */
.medical-bg {
position: fixed;
top: 0; left: 0;
width: 100%; height: 100%;
background: url('https://images.unsplash.com/photo-1584308666744-24d5c474f2ae?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80') no-repeat center center;
background-size: cover;
z-index: -1;
}

/* طبقة حماية زرقاء فوق الصورة لزيادة الاحترافية */
.overlay {
position: fixed;
top: 0; left: 0;
width: 100%; height: 100%;
background: linear-gradient(135deg, rgba(0, 98, 255, 0.8), rgba(0, 36, 94, 0.9));
z-index: -1;
}

.auth-container {
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
height: 100%;
padding: 20px;
text-align: center;
}

/* العنوان الكبير */
.brand-name {
color: white;
font-size: 3.5rem; /* حجم ضخم للشاشة */
font-weight: 900;
margin-bottom: 5px;
text-shadow: 0 5px 15px rgba(0,0,0,0.3);
line-height: 1.2;
}

.brand-sub {
color: #d1e3ff;
font-size: 1.1rem;
margin-bottom: 40px;
font-weight: 400;
}

/* كرت الدخول - يملأ العرض في الموبايل */
.login-card {
background: var(--glass-bg);
width: 100%;
max-width: 400px;
padding: 40px 25px;
border-radius: 25px;
box-shadow: 0 20px 40px rgba(0,0,0,0.3);
backdrop-filter: blur(10px);
}

.lang-switcher {
margin-bottom: 25px;
display: flex;
justify-content: center;
gap: 15px;
}

.lang-switcher button {
background: #f0f4f8;
border: 1px solid #ddd;
padding: 8px 20px;
border-radius: 50px;
cursor: pointer;
font-weight: bold;
color: #555;
transition: 0.3s;
}

.lang-switcher button.active {
background: var(--primary-blue);
color: white;
border-color: var(--primary-blue);
}

input {
width: 100%;
padding: 18px;
margin-bottom: 15px;
border: 2px solid #e0e6ed;
border-radius: 15px;
font-size: 1.1rem;
outline: none;
transition: 0.3s;
text-align: center;
}

input:focus { border-color: var(--primary-blue); }

.btn-enter {
width: 100%;
padding: 18px;
background: var(--primary-blue);
color: white;
border: none;
border-radius: 15px;
font-size: 1.2rem;
font-weight: 700;
cursor: pointer;
box-shadow: 0 10px 20px rgba(0, 98, 255, 0.3);
}

/* شاشة التطبيق الرئيسية */
#main-app { display: none; height: 100%; background: #f0f2f5; }

.bottom-nav {
position: fixed;
bottom: 0;
width: 100%;
height: 70px;
background: white;
display: flex;
box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
z-index: 100;
}

.nav-item {
flex: 1;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
color: #65676b;
font-size: 0.8rem;
cursor: pointer;
}

.nav-item.active { color: var(--primary-blue); }
.nav-icon { font-size: 1.5rem; }

</style>
</head>
<body dir="rtl">

<div id="auth-screen">
<div class="medical-bg"></div>
<div class="overlay"></div>

<div class="auth-container">
<h1 class="brand-name">سوق الدواء<br>السوداني</h1>
<p class="brand-sub">أكبر تجمع للصيدليات والموردين</p>

<div class="login-card">
<div class="lang-switcher">
<button class="active" onclick="setLang('ar')">العربية</button>
<button onclick="setLang('en')">English</button>
</div>

<div id="step-1">
<input type="email" id="userMail" placeholder="البريد الإلكتروني">
<button class="btn-enter" onclick="sendOTP()">إرسال رمز التأكيد</button>
</div>

<div id="step-2" style="display:none;">
<p style="margin-bottom:10px; color:#555;">أدخل الرمز المكون من 6 خانات</p>
<input type="text" id="otpCode" maxlength="6" placeholder="0 0 0 0 0 0">
<button class="btn-enter" onclick="finishAuth()">تأكيد الدخول</button>
</div>
</div>
</div>
</div>

<div id="main-app">
<div id="content-body" style="padding: 20px; overflow-y: auto; height: calc(100% - 70px);">
</div>

<nav class="bottom-nav" id="nav-bar">
</nav>
</div>

<script src="logic.js"></script>
<script src="home.js"></script>
<script src="profile.js"></script>
<script src="notifications.js"></script>
<script src="settings.js"></script>

<script>
// دوال الربط السريعة داخل الصفحة
function setLang(l) {
document.body.dir = (l === 'ar') ? 'rtl' : 'ltr';
// تغيير حالة الأزرار
document.querySelectorAll('.lang-switcher button').forEach(b => b.classList.remove('active'));
event.target.classList.add('active');
// استدعاء دالة اللغة في logic.js إذا كانت موجودة
if(typeof changeLanguage === 'function') changeLanguage(l);
}

function sendOTP() {
if(document.getElementById('userMail').value.includes('@')) {
document.getElementById('step-1').style.display = 'none';
document.getElementById('step-2').style.display = 'block';
} else {
alert("يرجى إدخال بريد إلكتروني صحيح");
}
}

function finishAuth() {
if(document.getElementById('otpCode').value.length === 6) {
document.getElementById('auth-screen').style.display = 'none';
document.getElementById('main-app').style.display = 'block';
if(typeof renderNavigation === 'function') renderNavigation();
if(typeof showHome === 'function') showHome();
} else {
alert("الرمز غير مكتمل");
}
}
</script>
</body>
</html>
